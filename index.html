<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>POLIPONI Ticketing</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#2d4cc8;
  --primary2:#4c6fff;
  --bg:#f4f6fb;
  --text:#111827;
  --muted:#6b7280;
  --white:#ffffff;
  --border:#e5e7eb;
  --shadow:0 10px 30px rgba(0,0,0,0.08);
  --radius:20px;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  background:var(--bg);
  font-family:'Poppins',sans-serif;
  color:var(--text);
}

.bg{
  position:fixed;
  inset:0;
  z-index:-1;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
  max-width:1200px;
  margin:auto;
}

.logo{
  font-size:22px;
  font-weight:800;
  color:var(--primary);
}

.steps{
  display:flex;
  gap:10px;
  padding:0 20px 20px;
  max-width:1200px;
  margin:auto;
}

.step{
  width:30px;
  height:30px;
  border-radius:50%;
  border:2px solid #ccc;
  display:flex;
  align-items:center;
  justify-content:center;
}

.step.active{
  background:var(--primary);
  color:white;
  border:none;
}

.container{
  width:92%;
  max-width:1200px;
  margin:auto;
}

.banner{
  border-radius:20px;
  overflow:hidden;
  margin-bottom:25px;
}

.banner img{
  width:100%;
  height:250px;
  object-fit:cover;
}

.section-title{
  font-size:24px;
  font-weight:800;
  margin-bottom:10px;
}

.ticket{
  background:white;
  padding:20px;
  border-radius:20px;
  margin-bottom:15px;
  box-shadow:var(--shadow);
}

.ticket-header{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.price{
  font-size:22px;
  font-weight:800;
}

.counter{
  display:flex;
  gap:10px;
  align-items:center;
}

.counter button{
  width:35px;
  height:35px;
  border:none;
  border-radius:50%;
  background:var(--primary);
  color:white;
  cursor:pointer;
}

.counter button:disabled{
  background:#ccc;
  cursor:not-allowed;
}

.summary{
  background:white;
  padding:20px;
  border-radius:20px;
  margin-top:20px;
}

.row{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.footer{
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  padding:15px;
  border-top:1px solid #eee;
}

.buy{
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  background:var(--primary);
  color:white;
  font-weight:700;
  cursor:pointer;
}

.buy:disabled{
  background:#ccc;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">POLIPONI</div>
</div>

<div class="steps">
  <div class="step active">1</div>
  <div class="step">2</div>
  <div class="step">3</div>
</div>

<div class="container">

<div class="banner">
  <img src="https://via.placeholder.com/1200x400" alt="Banner">
</div>

<h2 class="section-title">🎟️ TIKET</h2>

<div class="ticket">
  <div class="ticket-header">
    <div>PREMIUM</div>
    <div>REGULER</div>
  </div>

  <div class="price">Rp475.000</div>

  <div class="counter">
    <button onclick="dec('premium')" id="decPremium">-</button>
    <span id="premium">0</span>
    <button onclick="inc('premium')">+</button>
  </div>
</div>

<div class="ticket">
  <div class="ticket-header">
    <div>FAST TRACK</div>
    <div>REGULER</div>
  </div>

  <div class="price">Rp675.000</div>

  <div class="counter">
    <button onclick="dec('fast')" id="decFast">-</button>
    <span id="fast">0</span>
    <button onclick="inc('fast')">+</button>
  </div>
</div>

<div class="summary">
  <div class="row">
    <span>Premium</span>
    <span id="pTotal">Rp0</span>
  </div>
  <div class="row">
    <span>Fast</span>
    <span id="fTotal">Rp0</span>
  </div>
  <hr>
  <div class="row">
    <strong>Total</strong>
    <strong id="grand">Rp0</strong>
  </div>
</div>

</div>

<div class="footer">
  <button class="buy" id="buy" disabled onclick="beli()">Lanjut Pembelian</button>
</div>

<script>
let data = { premium:0, fast:0 };

const price = {
  premium:475000,
  fast:675000
};

const MAX = 10;

function totalQty(){
  return data.premium + data.fast;
}

function inc(type){
  if(totalQty() >= MAX){
    alert("Maksimal 10 tiket");
    return;
  }
  data[type]++;
  update();
}

function dec(type){
  if(data[type] > 0){
    data[type]--;
    update();
  }
}

function rupiah(n){
  return "Rp" + n.toLocaleString("id-ID");
}

function update(){
  let p = data.premium * price.premium;
  let f = data.fast * price.fast;
  let t = p + f;

  document.getElementById("premium").innerText = data.premium;
  document.getElementById("fast").innerText = data.fast;

  document.getElementById("pTotal").innerText = rupiah(p);
  document.getElementById("fTotal").innerText = rupiah(f);
  document.getElementById("grand").innerText = rupiah(t);

  document.getElementById("buy").disabled = t === 0;

  document.getElementById("decPremium").disabled = data.premium === 0;
  document.getElementById("decFast").disabled = data.fast === 0;
}

function beli(){
  let total = (data.premium * price.premium) + (data.fast * price.fast);

  let url = "https://poliponi.github.io/PEMBELIAN/" +
  `?premium=${data.premium}&fast=${data.fast}&total=${total}`;

  window.location.href = url;
}
</script>

</body>
</html>

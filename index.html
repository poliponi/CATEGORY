<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POLIPONI Ticketing</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#2d4cc8;
  --bg:#f4f6fb;
  --text:#111827;
  --muted:#6b7280;
  --white:#fff;
  --shadow:0 10px 25px rgba(0,0,0,0.08);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Poppins',sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* BANNER */
.banner{
  width:100%;
  max-height:280px;
  overflow:hidden;
}

.banner img{
  width:100%;
  height:280px;
  object-fit:cover;
  display:block;
}

/* CONTENT */
.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

h2{
  font-size:26px;
  margin-bottom:20px;
  font-weight:800;
}

.ticket{
  background:white;
  border-radius:18px;
  padding:18px;
  margin-bottom:15px;
  box-shadow:var(--shadow);
}

.ticket-header{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.badge{
  font-size:12px;
  font-weight:700;
  padding:5px 10px;
  border-radius:999px;
}

.badge.sold{
  background:#fee2e2;
  color:#dc2626;
}

.badge.active{
  background:#e0e7ff;
  color:#2d4cc8;
}

.price{
  font-size:22px;
  font-weight:800;
}

.counter{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:10px;
}

.counter button{
  width:35px;
  height:35px;
  border:none;
  border-radius:50%;
  background:var(--primary);
  color:white;
  font-size:18px;
  cursor:pointer;
}

.counter button:disabled{
  background:#ccc;
  cursor:not-allowed;
}

.sold-out{
  opacity:.6;
}

.summary{
  background:white;
  padding:18px;
  border-radius:18px;
  margin-top:20px;
  box-shadow:var(--shadow);
}

.row{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.footer{
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  padding:15px;
  border-top:1px solid #eee;
}

.buy{
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  background:var(--primary);
  color:white;
  font-weight:700;
  cursor:pointer;
}

.buy:disabled{
  background:#ccc;
}
</style>
</head>

<body>

<!-- BANNER -->
<div class="banner">
  <img src="banner.jpg" alt="Banner Event"
       onerror="this.src='https://via.placeholder.com/1200x400?text=POLIPONI+EVENT'">
</div>

<div class="container">

<h2>🎟️ Pilih Tiket</h2>

<!-- FESTIVAL SOLD OUT -->
<div class="ticket sold-out">
  <div class="ticket-header">
    <div>Reguler Festival</div>
    <div class="badge sold">SOLD OUT</div>
  </div>
  <div class="price">Sold Out</div>
</div>

<!-- PREMIUM -->
<div class="ticket">
  <div class="ticket-header">
    <div>Reguler Premium</div>
    <div class="badge active">ON SALE</div>
  </div>
  <div class="price">Rp475.000</div>

  <div class="counter">
    <button onclick="dec('premium')" id="decPremium">-</button>
    <span id="premium">0</span>
    <button onclick="inc('premium')">+</button>
  </div>
</div>

<!-- FAST TRACK -->
<div class="ticket">
  <div class="ticket-header">
    <div>Reguler Fast Track</div>
    <div class="badge active">ON SALE</div>
  </div>
  <div class="price">Rp675.000</div>

  <div class="counter">
    <button onclick="dec('fast')" id="decFast">-</button>
    <span id="fast">0</span>
    <button onclick="inc('fast')">+</button>
  </div>
</div>

<!-- SUMMARY -->
<div class="summary">
  <div class="row">
    <span>Premium</span>
    <span id="pTotal">Rp0</span>
  </div>
  <div class="row">
    <span>Fast Track</span>
    <span id="fTotal">Rp0</span>
  </div>
  <hr>
  <div class="row">
    <strong>Total</strong>
    <strong id="grand">Rp0</strong>
  </div>
</div>

</div>

<div class="footer">
  <button class="buy" id="buy" disabled onclick="beli()">Selanjutnya</button>
</div>

<script>
let data = { premium:0, fast:0 };

const price = {
  premium:475000,
  fast:675000
};

const MAX = 10;

function totalQty(){
  return data.premium + data.fast;
}

function inc(type){
  if(totalQty() >= MAX){
    alert("Maksimal tiket tercapai");
    return;
  }
  data[type]++;
  update();
}

function dec(type){
  if(data[type] > 0){
    data[type]--;
    update();
  }
}

function rupiah(n){
  return "Rp" + n.toLocaleString("id-ID");
}

function update(){
  let p = data.premium * price.premium;
  let f = data.fast * price.fast;
  let total = p + f;

  document.getElementById("premium").innerText = data.premium;
  document.getElementById("fast").innerText = data.fast;

  document.getElementById("pTotal").innerText = rupiah(p);
  document.getElementById("fTotal").innerText = rupiah(f);
  document.getElementById("grand").innerText = rupiah(total);

  document.getElementById("buy").disabled = total === 0;

  document.getElementById("decPremium").disabled = data.premium === 0;
  document.getElementById("decFast").disabled = data.fast === 0;
}

function beli(){
  let total = (data.premium * price.premium) + (data.fast * price.fast);

  if(total === 0){
    alert("Silakan pilih tiket terlebih dahulu");
    return;
  }

  let url = "https://poliponi.github.io/PEMBELIAN/" +
  `?premium=${data.premium}&fast=${data.fast}&total=${total}`;

  window.location.href = url;
}
</script>

</body>
</html>
